name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets --locked
      - name: Test
        run: cargo test --workspace --locked

  msrv:
    name: msrv (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.82.0
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --workspace --locked

  dst:
    name: dst
    runs-on: ubuntu-latest
    env:
      # Run more proptest cases in CI than the local default to widen seed
      # coverage of the deterministic simulation suite.
      PROPTEST_CASES: 256
      # Bound each run's processed-event count; matches DEFAULT_MAX_EVENTS so a
      # CI run is budgeted the same as a run built from defaults.
      VELA_DST_MAX_EVENTS: 200000
      # Tell the harness to persist run summaries / failure artifacts here so the
      # upload-artifact step below can collect them when a run fails.
      VELA_DST_ARTIFACT_DIR: target/dst-artifacts
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run DST suite
        run: cargo test -p vela-sim --features sim --locked
      - name: Upload DST failure artifacts
        # Runs only when a previous step (the DST suite) failed. The failed
        # `cargo test` step still fails the job; this upload does not mask it.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dst-artifacts
          path: |
            crates/vela-sim/proptest-regressions/
            target/dst-artifacts/
          if-no-files-found: ignore

  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    # Hard wall-clock cap for the Benchmark_Job. The run itself is bounded by
    # `--time-budget-secs 120` (well under the 300s CI budget); this 30-minute
    # ceiling is the outer safety net required so a stuck run fails the job.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build vela-bench (release)
        run: cargo build -p vela-bench --release --locked
      - name: Prepare report directory
        run: mkdir -p target/bench
      - name: Run throughput benchmark
        # CI-designated, bounded Workload_Parameters. Produce on the durable
        # single-node path fsyncs every append, so sustained produce throughput
        # is modest (tens of records/sec on a shared runner); the record count
        # and budget are sized so a run completes comfortably within the budget
        # with margin for a slow/noisy runner. A failing Outcome (operation
        # error, integrity failure, or time-budget breach) exits non-zero and
        # fails the job. No throughput floors are configured: on a noisy shared
        # runner the job is gated only on errors / integrity / time budget.
        run: |
          ./target/release/vela-bench \
            --record-count 1000 \
            --value-size 256 \
            --partition-count 4 \
            --producer-concurrency 16 \
            --warmup 100 \
            --time-budget-secs 240 \
            --startup-budget-secs 60 \
            --topic vela-bench-ci \
            --report-json target/bench/report.json \
            --report-html target/bench/report.html
      - name: Upload benchmark reports
        # Publish both reports regardless of Outcome (Requirement 7.4). This
        # upload does not mask a failing run: the benchmark step above still
        # fails the job on a non-zero exit.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: throughput-benchmark-report
          path: |
            target/bench/report.json
            target/bench/report.html
          retention-days: 7
          if-no-files-found: error
