# Local multi-node Vela cluster (Requirements 14.2, 14.3, 14.5).
#
# Brings up four `velad` nodes wired into a single cluster. Every node is built
# from the root Dockerfile and configured entirely through the environment
# variables that `crates/vela-server/src/config.rs` parses:
#
#   VELA_NODE_ID            stable identity of the node
#   VELA_LISTEN_ADDR        address the gRPC listener binds on (in-container)
#   VELA_ADVERTISED_ADDR    client-reachable address published in cluster
#                           metadata (the host-published 127.0.0.1:700N here),
#                           distinct from the in-container bind address so a
#                           host client discovering members via DescribeCluster
#                           dials a reachable address (advertised-listeners
#                           Req 8.1, 8.2)
#   VELA_PEERS              comma-separated `id@listen@advertised` list of the
#                           OTHER nodes (the id matches each peer's
#                           VELA_NODE_ID, so node identity is consistent
#                           cluster-wide). The `listen` half is the Docker DNS
#                           bind address `nodeN:7001` used for inter-node
#                           dialing; the `advertised` half is the peer's
#                           host-published `127.0.0.1:700N` carried into served
#                           metadata so any node reports every member's
#                           host-reachable address (advertised-listeners Req 8.3)
#   VELA_REPLICATION_FACTOR replicas per partition (Raft group size)
#   VELA_DATA_DIR           in-container root for durable partition logs
#
# Each service joins the Compose default network, so nodes resolve one another
# by service name (node1..node4) via Docker DNS. Every node's peer list points
# at the other three, so on startup each node discovers all other configured
# nodes as cluster members (Req 14.3), enabling produce/consume on topics
# created against the running cluster (Req 14.5).
#
# Container port 7001 is mapped to a distinct host port per node (7001..7004)
# so a local client or `vela-ctl` can reach any individual node. Each node
# advertises its own host-published 127.0.0.1:700N mapping (and carries each
# peer's host-published mapping in VELA_PEERS), so a host client querying any
# single published node discovers all four host-reachable addresses.
#
# Durability (Requirement 15): each node sets `VELA_DATA_DIR` to the in-container
# path `/var/lib/vela` and mounts its OWN distinct named volume there
# (node1-data..node4-data). The per-node volumes keep durable partition state
# (and the durable `__meta` group) isolated per node and surviving container
# restarts: when a container is recreated with its volume reattached, the node
# recovers the durable data written before the restart (Req 15.3).
#
# Usage:
#   docker compose up --build

name: vela

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    image: vela/velad
    container_name: vela-node1
    hostname: node1
    environment:
      VELA_NODE_ID: node1
      VELA_LISTEN_ADDR: 0.0.0.0:7001
      VELA_ADVERTISED_ADDR: 127.0.0.1:7001
      VELA_PEERS: node2@node2:7001@127.0.0.1:7002,node3@node3:7001@127.0.0.1:7003,node4@node4:7001@127.0.0.1:7004
      VELA_REPLICATION_FACTOR: "3"
      VELA_DATA_DIR: /var/lib/vela
    ports:
      - "7001:7001"
    networks:
      - vela
    volumes:
      - node1-data:/var/lib/vela
    restart: unless-stopped

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    image: vela/velad
    container_name: vela-node2
    hostname: node2
    environment:
      VELA_NODE_ID: node2
      VELA_LISTEN_ADDR: 0.0.0.0:7001
      VELA_ADVERTISED_ADDR: 127.0.0.1:7002
      VELA_PEERS: node1@node1:7001@127.0.0.1:7001,node3@node3:7001@127.0.0.1:7003,node4@node4:7001@127.0.0.1:7004
      VELA_REPLICATION_FACTOR: "3"
      VELA_DATA_DIR: /var/lib/vela
    ports:
      - "7002:7001"
    networks:
      - vela
    volumes:
      - node2-data:/var/lib/vela
    restart: unless-stopped

  node3:
    build:
      context: .
      dockerfile: Dockerfile
    image: vela/velad
    container_name: vela-node3
    hostname: node3
    environment:
      VELA_NODE_ID: node3
      VELA_LISTEN_ADDR: 0.0.0.0:7001
      VELA_ADVERTISED_ADDR: 127.0.0.1:7003
      VELA_PEERS: node1@node1:7001@127.0.0.1:7001,node2@node2:7001@127.0.0.1:7002,node4@node4:7001@127.0.0.1:7004
      VELA_REPLICATION_FACTOR: "3"
      VELA_DATA_DIR: /var/lib/vela
    ports:
      - "7003:7001"
    networks:
      - vela
    volumes:
      - node3-data:/var/lib/vela
    restart: unless-stopped

  node4:
    build:
      context: .
      dockerfile: Dockerfile
    image: vela/velad
    container_name: vela-node4
    hostname: node4
    environment:
      VELA_NODE_ID: node4
      VELA_LISTEN_ADDR: 0.0.0.0:7001
      VELA_ADVERTISED_ADDR: 127.0.0.1:7004
      VELA_PEERS: node1@node1:7001@127.0.0.1:7001,node2@node2:7001@127.0.0.1:7002,node3@node3:7001@127.0.0.1:7003
      VELA_REPLICATION_FACTOR: "3"
      VELA_DATA_DIR: /var/lib/vela
    ports:
      - "7004:7001"
    networks:
      - vela
    volumes:
      - node4-data:/var/lib/vela
    restart: unless-stopped

networks:
  vela:
    driver: bridge

# Per-node named volumes (Requirement 15.2): each node mounts its own distinct
# volume at VELA_DATA_DIR (/var/lib/vela), so durable partition logs and the
# durable `__meta` group persist across container restarts and nodes never
# share storage.
volumes:
  node1-data:
  node2-data:
  node3-data:
  node4-data:
